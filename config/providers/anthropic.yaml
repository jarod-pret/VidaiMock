name: "anthropic"
matcher: "^/v1/messages(/stream)?$"
response_template: "anthropic/message.json.j2"
stream:
  enabled: true
  frame_format: raw
  lifecycle:
    on_start:
      template_path: "anthropic/stream/start.json.j2"
    on_chunk:
      template_path: "anthropic/stream/delta.json.j2"
    on_stop:
      template_path: "anthropic/stream/stop.json.j2"
