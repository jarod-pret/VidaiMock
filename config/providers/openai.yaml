name: "openai"
matcher: "^/v1/chat/completions$"
priority: 1
response_template: "openai/chat.json.j2"
# Rendered instead of response_template when a chaos override (chaos_status
# query, X-Mock-Status header, X-Vidai-Chaos-Drop) triggers an error status.
error_template: "openai/error.json.j2"
stream:
  enabled: true
  frame_format: raw
  lifecycle:
    on_chunk:
       template_body: 'data: {"id":"chatcmpl-mock","object":"chat.completion.chunk","created":1699000000,"model":"{{ model }}","choices":[{"index":0,"delta":{% if chunk is string %}{"content":"{{ chunk }}"}{% else %}{"tool_calls":{{ chunk | json_encode() }}}{% endif %},"finish_reason":null}]}'
    # Terminal sequence matches real OpenAI: a finish_reason chunk with empty
    # delta, then (optionally) a usage-only chunk when stream_options.include_usage
    # is set, then the [DONE] sentinel. Each event separated by a blank line
    # as required by the SSE spec.
    on_stop:
       template_path: "openai/stream_stop.sse.j2"
