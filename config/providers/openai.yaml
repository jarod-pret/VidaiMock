name: "openai"
matcher: "^/v1/chat/completions$"
response_template: "openai/chat.json.j2"
stream:
  enabled: true
  format: '{{ chunk }}' 
  lifecycle:
    on_chunk:
       template_body: '{"id":"chatcmpl-mock","object":"chat.completion.chunk","created":1699000000,"model":"{{ model }}","choices":[{"index":0,"delta":{% if chunk is string %}{"content":"{{ chunk }}"}{% else %}{"tool_calls":{{ chunk | json_encode() }}}{% endif %},"finish_reason":null}]}'
    on_stop:
       template_body: '[DONE]'
