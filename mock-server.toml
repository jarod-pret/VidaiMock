port = 8100
workers = 8
log_level = "info"
config_dir = "config" # Single mode schema root. In single mode, providers/ and templates/ live under config/

[tenancy]
mode = "single" # "single" uses config/ and stays backward-compatible. "multi" uses tenants/
# tenant_header = "x-tenant" # Optional explicit tenant header for multi mode requests.
# [tenancy.admin_auth] # Optional global admin auth for /admin/* management endpoints.
# header = "x-admin-key"
# value = "change-me" # Supported secret sources: value, value_file, value_env. File is preferred.
# tenants_dir = "tenants" # In multi mode, each tenant schema lives under tenants/<id>/. tenants/default/ is only needed to customize the default tenant.
# [[tenancy.tenants]]
# id = "acme"
# [[tenancy.tenants.keys]]
# source = "header"
# name = "x-api-key"
# value = "acme-secret"

# Latency Simulation Configuration
[latency]
# Options: "benchmark" (no sleep), "realistic" (sleep +- jitter), "debug" (logging)
mode = "benchmark"
base_ms = 50
jitter_pct = 0.2

# Define custom endpoints (Optional - Providers in config/providers/ are loaded automatically)
# Use this section only for quick manual overrides or simple echo endpoints.
# [[endpoints]]
# path = "/legacy/chat"
# format = "openai"
